mixed-port: 7899
allow-lan: true
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
secret: "__SECRET__"

# 内网域名要在 VPN 隧道侧解析,不能在本机解析(命门)。
# 宿主 Clash 在 TUN 模式会劫持容器一切明文 :53 查询 → fake-ip(198.18/15),致 danted
# 把内网域名解析成不可路由的假 IP。故 mihomo 用 DoH 上游(:443,绕开劫持)解析,并自身
# listen :53 供 oss 容器当解析器(create_channel 给 oss 容器注入 --dns=mihomo),danted
# 即可拿到真实内网 IP。respect-rules 让 DNS 跟随分流规则。
dns:
  enable: true
  listen: 0.0.0.0:53
  enhanced-mode: redir-host
  nameserver: ["https://223.5.5.5/dns-query", "https://1.1.1.1/dns-query"]
  respect-rules: true
  proxy-server-nameserver: [127.0.0.11]  # Docker 内置 DNS:正确解析 vpn-* 容器名到真实 IP(公网 DNS 会 fake-ip → 代理连不上)

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 8443]

proxies: []
proxy-groups: []
rules:
  - MATCH,DIRECT
